# Server Configuration
server.port=8080
server.servlet.context-path=/

# PostgreSQL Database - same PostgreSQL instance, different database
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:5432/${DB_NAME:energy_db}
spring.datasource.username=${DB_USERNAME:energy}
spring.datasource.password=${DB_PASSWORD:energy_prod}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Hikari connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Europe/Madrid

# WebSocket
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536

# Logging
logging.level.com.portafolio.energy=INFO
logging.level.org.springframework.web.socket=INFO

# Disable H2 console
spring.h2.console.enabled=false
